# ATC Transcription Tool - Configuration File
# This file will be used for future audio transcription features

[GENERAL]
# Application settings
auto_format_on_paste = True
show_violations_automatically = True
enable_syntax_highlighting = True

[AUDIO]
# Audio transcription settings (future feature)
audio_provider = whisper  # Options: whisper, google, azure
sample_rate = 16000
channels = mono
audio_format = wav

[FORMATTING]
# Formatting preferences
preserve_filler_words = True
use_angled_brackets_for_uncertainty = True
capitalize_callsigns = True
spell_out_numbers = True

[CALLSIGNS]
# Custom callsigns to recognize (add your commonly used ones)
custom_airlines = []
custom_facilities = []

[EXPORT]
# Export settings
default_format = txt
include_timestamp = False
include_violations_report = False

[ADVANCED]
# Advanced settings
enable_autocorrect = False
strict_mode = True  # Strict adherence to all rules

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATC Transcription Web App</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body { background: #f8f9fa; }
        .container { max-width: 900px; margin-top: 40px; }
        textarea { font-family: Consolas, monospace; }
        .violation { color: #c00; font-weight: bold; }
        .audio-section { margin-top: 2em; }
    </style>
</head>
<body>
<div class="container">
    <h1 class="mb-4">ATC Transcription Tool (Web)</h1>
    <form id="transcription-form">
        <div class="mb-3">
            <label for="inputText" class="form-label">Input Transcript</label>
            <textarea class="form-control" id="inputText" rows="4" placeholder="Enter ATC transmission here..."></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Format Transcript</button>
    </form>
    <div class="mt-4">
        <div class="row">
            <div class="col-md-6">
                <form id="transcription-form">
                        <div class="mb-3">
                                <label for="inputText" class="form-label">Input Transcript</label>
                                <textarea class="form-control" id="inputText" rows="8" placeholder="Enter your ATC transcription here...\n\nExample:\nNOVEMBER 998 BRAVO BRAVO, radar services terminated. Squawk VFR, change to advisory is approved.\n\nThe app will automatically format it according to ATC standards."></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Format Transcript</button>
                </form>
                <div class="audio-section mt-4">
                        <h5 class="mb-3">Audio Upload & Playback</h5>
                        <div class="row g-2 align-items-center">
                                <div class="col-auto">
                                        <form id="audio-upload-form" class="d-flex flex-row align-items-center gap-2">
                                                <input type="file" id="audioFile" accept="audio/*" class="form-control form-control-sm">
                                                <button type="submit" class="btn btn-secondary btn-sm">Upload Audio</button>
                                        </form>
                                </div>
                                <div class="col-auto">
                                        <button id="recordBtn" class="btn btn-danger btn-sm">Start Recording</button>
                                        <button id="stopBtn" class="btn btn-secondary btn-sm" disabled>Stop</button>
                                </div>
                                <div class="col-auto">
                                        <span id="recordingStatus" style="margin-left:1em;color:#c00;"></span>
                                </div>
                        </div>
                        <audio id="audioPlayer" controls style="width:100%; margin-top:1em; display:none;"></audio>
                </div>
            </div>
            <div class="col-md-6">
                <ul class="nav nav-tabs" id="outputTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="formatted-tab" data-bs-toggle="tab" data-bs-target="#formatted" type="button" role="tab">Formatted Output</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="violations-tab" data-bs-toggle="tab" data-bs-target="#violations" type="button" role="tab">Violations</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="rules-tab" data-bs-toggle="tab" data-bs-target="#rules" type="button" role="tab">Formatting Rules</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="editor-tab" data-bs-toggle="tab" data-bs-target="#editor" type="button" role="tab">Rules Editor</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="examples-tab" data-bs-toggle="tab" data-bs-target="#examples" type="button" role="tab">Learn from Examples</button>
                    </li>
                </ul>
                <div class="tab-content border border-top-0 p-3 bg-white" id="outputTabsContent" style="min-height:300px;">
                    <div class="tab-pane fade show active" id="formatted" role="tabpanel">
                        <label class="form-label fw-bold">Formatted Transcript:</label>
                        <textarea class="form-control" id="outputText" rows="6" readonly></textarea>
                        <button class="btn btn-outline-secondary btn-sm mt-2" id="copyBtn">Copy to Clipboard</button>
                    </div>
                    <div class="tab-pane fade" id="violations" role="tabpanel">
                        <label class="form-label fw-bold">Violations:</label>
                        <ul id="violationsList"></ul>
                    </div>
                    <div class="tab-pane fade" id="rules" role="tabpanel">
                        <label class="form-label fw-bold">Formatting Rules:</label>
                        <div id="rulesContent">(Formatting rules will appear here.)</div>
                    </div>
                    <div class="tab-pane fade" id="editor" role="tabpanel">
                        <label class="form-label fw-bold">Rules Editor:</label>
                        <form id="rulesForm">
                            <div class="mb-2">
                                <label for="rulesJson" class="form-label">Edit Custom Rules (JSON):</label>
                                <textarea class="form-control" id="rulesJson" rows="8"></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary btn-sm">Save Rules</button>
                            <span id="rulesSaveStatus" class="ms-2"></span>
                        </form>
                    </div>
                    <div class="tab-pane fade" id="examples" role="tabpanel">
                        <label class="form-label fw-bold">Learn from Examples:</label>
                        <form id="exampleForm" class="mb-3">
                            <div class="mb-2">
                                <label for="exampleInput" class="form-label">Input Transcript Example:</label>
                                <textarea class="form-control" id="exampleInput" rows="2"></textarea>
                            </div>
                            <div class="mb-2">
                                <label for="exampleOutput" class="form-label">Correct Formatted Output:</label>
                                <textarea class="form-control" id="exampleOutput" rows="2"></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary btn-sm">Submit Example</button>
                            <span id="exampleSaveStatus" class="ms-2"></span>
                        </form>
                        <div>
                            <label class="form-label">Saved Examples:</label>
                            <ul id="examplesList" class="list-group"></ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
</div>
<script>
// --- Rules Editor logic ---
async function loadRules() {
    const res = await fetch('/api/rules');
    const data = await res.json();
    document.getElementById('rulesJson').value = JSON.stringify(data, null, 2);
}
document.getElementById('rulesForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const rulesText = document.getElementById('rulesJson').value;
    try {
        const rules = JSON.parse(rulesText);
        const res = await fetch('/api/rules', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(rules)
        });
        if (res.ok) {
            document.getElementById('rulesSaveStatus').textContent = 'Saved!';
        } else {
            document.getElementById('rulesSaveStatus').textContent = 'Error saving.';
        }
    } catch (err) {
        document.getElementById('rulesSaveStatus').textContent = 'Invalid JSON.';
    }
});
document.getElementById('editor-tab').addEventListener('click', loadRules);

// --- Learn from Examples logic ---
async function loadExamples() {
    const res = await fetch('/api/examples');
    const data = await res.json();
    const list = document.getElementById('examplesList');
    list.innerHTML = '';
    data.forEach(ex => {
        const li = document.createElement('li');
        li.className = 'list-group-item';
        li.innerHTML = `<b>Input:</b> ${ex.input}<br/><b>Output:</b> ${ex.output}`;
        list.appendChild(li);
    });
}
document.getElementById('exampleForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const input = document.getElementById('exampleInput').value;
    const output = document.getElementById('exampleOutput').value;
    const res = await fetch('/api/examples', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ input, output })
    });
    if (res.ok) {
        document.getElementById('exampleSaveStatus').textContent = 'Saved!';
        document.getElementById('exampleInput').value = '';
        document.getElementById('exampleOutput').value = '';
        loadExamples();
    } else {
        document.getElementById('exampleSaveStatus').textContent = 'Error saving.';
    }
});
document.getElementById('examples-tab').addEventListener('click', loadExamples);
// Handle transcription formatting
const form = document.getElementById('transcription-form');
form.addEventListener('submit', async function(e) {
    e.preventDefault();
    const inputText = document.getElementById('inputText').value;
    const res = await fetch('/api/format', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: inputText })
    });
    const data = await res.json();
    document.getElementById('outputText').value = data.formatted;
    // Switch to Formatted Output tab
    var tab = new bootstrap.Tab(document.querySelector('#formatted-tab'));
    tab.show();
    // Violations
    const violationsList = document.getElementById('violationsList');
    violationsList.innerHTML = '';
    if (data.violations && data.violations.length > 0) {
        data.violations.forEach(v => {
            const li = document.createElement('li');
            li.textContent = v;
            li.className = 'violation';
            violationsList.appendChild(li);
        });
    } else {
        const li = document.createElement('li');
        li.textContent = '✓ No violations found - great job!';
        li.style.color = 'green';
        violationsList.appendChild(li);
    }
});
// Copy to clipboard
document.getElementById('copyBtn').addEventListener('click', function() {
    const outputText = document.getElementById('outputText');
    outputText.select();
    document.execCommand('copy');
});
// Handle audio upload and playback
const audioForm = document.getElementById('audio-upload-form');
audioForm.addEventListener('submit', async function(e) {
    e.preventDefault();
    const fileInput = document.getElementById('audioFile');
    if (!fileInput.files.length) return;
    const formData = new FormData();
    formData.append('file', fileInput.files[0]);
    const res = await fetch('/api/upload', { method: 'POST', body: formData });
    const data = await res.json();
    if (data.filename) {
        const audioPlayer = document.getElementById('audioPlayer');
        audioPlayer.src = `/uploads/${data.filename}`;
        audioPlayer.style.display = 'block';
        audioPlayer.load();
    }
});
// Microphone recording logic
let mediaRecorder;
let audioChunks = [];
const recordBtn = document.getElementById('recordBtn');
const stopBtn = document.getElementById('stopBtn');
const recordingStatus = document.getElementById('recordingStatus');

recordBtn.addEventListener('click', async function() {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        alert('Your browser does not support audio recording.');
        return;
    }
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        mediaRecorder.ondataavailable = e => {
            if (e.data.size > 0) audioChunks.push(e.data);
        };
        mediaRecorder.onstop = async () => {
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            // Upload the recorded audio
            const formData = new FormData();
            formData.append('file', audioBlob, 'recording.webm');
            recordingStatus.textContent = 'Uploading...';
            const res = await fetch('/api/upload', { method: 'POST', body: formData });
            const data = await res.json();
            if (data.filename) {
                const audioPlayer = document.getElementById('audioPlayer');
                audioPlayer.src = `/uploads/${data.filename}`;
                audioPlayer.style.display = 'block';
                audioPlayer.load();
                recordingStatus.textContent = 'Recording uploaded!';
            } else {
                recordingStatus.textContent = 'Upload failed.';
            }
        };
        mediaRecorder.start();
        recordBtn.disabled = true;
        stopBtn.disabled = false;
        recordingStatus.textContent = 'Recording...';
    } catch (err) {
        alert('Could not access microphone: ' + err.message);
    }
});

stopBtn.addEventListener('click', function() {
    if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
        recordBtn.disabled = false;
        stopBtn.disabled = true;
        recordingStatus.textContent = 'Processing...';
    }
});
</script>
</body>
</html>
